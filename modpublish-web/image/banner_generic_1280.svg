            <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="1280" height="640" fill="url(#bgGlow)"/>
    <g opacity="0.04">
        <path d="M 0,50 L 1280,50 M 0,100 L 1280,100 M 0,150 L 1280,150 M 0,200 L 1280,200 M 0,250 L 1280,250 M 0,300 L 1280,300 M 0,350 L 1280,350 M 0,400 L 1280,400 M 0,450 L 1280,450 M 0,500 L 1280,500 M 0,550 L 1280,550 M 0,600 L 1280,600"
