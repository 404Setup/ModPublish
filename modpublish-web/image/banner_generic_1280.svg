        <path d="M 100,0 L 100,640 M 200,0 L 200,640 M 300,0 L 300,640 M 400,0 L 400,640 M 500,0 L 500,640 M 600,0 L 600,640 M 700,0 L 700,640 M 800,0 L 800,640 M 900,0 L 900,640 M 1000,0 L 1000,640 M 1100,0 L 1100,640 M 1200,0 L 1200,640"
