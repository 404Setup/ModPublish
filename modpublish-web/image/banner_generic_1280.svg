<svg version="1.1" viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="bgGlow" cx="25%" cy="50%" r="55%">
            <stop offset="0%" stop-color="#0F4C3A" stop-opacity="0.5"/>
            <stop offset="60%" stop-color="#0F0F12" stop-opacity="1"/>
            <stop offset="100%" stop-color="#0A0A0C" stop-opacity="1"/>
        </radialGradient>
        <linearGradient id="genericGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="50%" stop-color="#059669"/>
            <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
        <linearGradient id="grassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#76C035"/>
            <stop offset="100%" stop-color="#4C8620"/>
        </linearGradient>
        <linearGradient id="grassLeftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6AA830"/>
            <stop offset="100%" stop-color="#45781E"/>
        </linearGradient>
        <linearGradient id="grassRightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#5E962B"/>
            <stop offset="100%" stop-color="#3D6B1B"/>
        </linearGradient>
        <linearGradient id="dirtLeft" x1="0%" y1="0%" x2="100%" y2="100%">
