<svg version="1.1" viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="genericGradient" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10B981"/>
            <stop offset="50%" stop-color="#059669"/>
            <stop offset="100%" stop-color="#06B6D4"/>
        </linearGradient>
        <linearGradient id="grassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#76C035"/>
            <stop offset="100%" stop-color="#4C8620"/>
        </linearGradient>
        <linearGradient id="grassLeftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6AA830"/>
            <stop offset="100%" stop-color="#45781E"/>
        </linearGradient>
        <linearGradient id="grassRightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#5E962B"/>
            <stop offset="100%" stop-color="#3D6B1B"/>
        </linearGradient>
        <linearGradient id="dirtLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#866043"/>
            <stop offset="100%" stop-color="#593E2B"/>
        </linearGradient>
        <linearGradient id="dirtRight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6E4E35"/>
            <stop offset="100%" stop-color="#483120"/>
        </linearGradient>
        <radialGradient id="blockShadow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#000000" stop-opacity="0.6"/>
