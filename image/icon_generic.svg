        </radialGradient>
    </defs>
    <rect x="4" y="4" width="120" height="120" rx="24" fill="#1E1E24"/>
    <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="url(#genericGradient)" stroke-width="3"/>
    <path d="M 85,45 L 35,65 L 53,72 L 42,92 Z M 53,72 L 85,45" fill="none" stroke="#FFFFFF" stroke-width="4.5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.08"/>
    <ellipse cx="64" cy="114" rx="32" ry="8" fill="url(#blockShadow)"/>
    <path d="M 110,10 L 110,32 L 96,32 L 66,62 L 58,54 L 88,24 L 88,10 Z" fill="url(#genericGradient)"
          filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.3))"/>
    <path d="M 34,72 L 64,87 L 64,117 L 34,102 Z" fill="url(#dirtLeft)"/>
    <path d="M 64,87 L 94,72 L 94,102 L 64,117 Z" fill="url(#dirtRight)"/>
    <path d="M 40,87 L 45,89.5 L 45,94.5 L 40,92 Z" fill="#4E3625" opacity="0.6"/>
    <path d="M 50,102 L 55,104.5 L 55,109.5 L 50,107 Z" fill="#4E3625" opacity="0.6"/>
    <path d="M 80,87 L 85,84.5 L 85,89.5 L 80,92 Z" fill="#3D291A" opacity="0.6"/>
    <path d="M 70,102 L 75,99.5 L 75,104.5 L 70,107 Z" fill="#3D291A" opacity="0.6"/>
    <path d="M 34,72 L 34,80 L 44,85 L 44,91 L 54,96 L 54,90 L 64,95 L 64,87 Z" fill="url(#grassLeftGradient)"/>
    <path d="M 64,87 L 64,99 L 74,94 L 74,88 L 84,83 L 84,87 L 94,82 L 94,72 Z" fill="url(#grassRightGradient)"/>
    <path d="M 64,57 L 94,72 L 64,87 L 34,72 Z" fill="url(#grassGradient)"/>
